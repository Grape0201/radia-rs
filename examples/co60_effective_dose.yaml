# demonstrates the calculation of effective dose rate constant for Co-60
# need some math to calculate the expected value

dose_quantity:
  # E(AP) conversion factor [pSv cm2]
  energy_groups: [0.8, 1.0, 1.117, 1.33, 1.5]
  conversion_factors: [3.73, 4.49, 4.9, 5.6, 6.12]

source:
  type: "Point"
  position: [0.0, 0.0, 0.0]
  intensity: 2.0  # ~2 photons/sec
  energy_groups: [1.17, 1.33]  # MeV
  intensity_by_group: [0.5, 0.5]

detectors:
  - name: at1m
    position: [100.0, 0.0, 0.0]

