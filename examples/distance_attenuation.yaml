# demonstrates the calculation of distance attenuation

dose_quantity:
  energy_groups: [1.0]
  conversion_factors: [1.0]

source:
  type: "Point"
  position: [0.0, 0.0, 0.0]
  intensity: 1.0
  energy_groups: [1.0]
  intensity_by_group: [1.0]

detectors:
  - name: Det1
    position: [10.0, 0.0, 0.0]  # 1/4/pi/10^2 = 0.007957747154591797
  - name: Det2
    position: [20.0, 0.0, 0.0]  # 1/4/pi/20^2 = 0.0019894367886479492
