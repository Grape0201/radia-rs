world:
  primitives:
    - name: "source_sphere"
      type: "Sphere"
      center: [0.0, 0.0, 0.0]
      radius: 2.0
    - name: "shield_box"
      type: "RectangularParallelPiped"
      min: [-5.0, -5.0, -5.0]
      max: [5.0, 5.0, 5.0]
  materials:
    - "Water"
    - "Iron"
  cells:
    - material_name: "Water"
      csg: "source_sphere"
    - material_name: "Iron"
      csg:
        op: "difference"
        prs:
          - "shield_box"
          - "source_sphere"
materials:
  - name: "Water"
    density: 1.0
    composition:
      1: 0.112
      8: 0.888
  - name: "Iron"
    density: 7.87
    composition:
      26: 1.0

buildup_params:
  - material_name: "WaterGP"
    params:
      - energy_mev: 1.0
        a: 0.1
        b: 2.0
        c: 0.5
        d: 0.05
        xk: 14.0
  - material_name: "IronGP"
    params:
      - energy_mev: 1.0
        a: 0.15
        b: 1.5
        c: 0.6
        d: 0.04
        xk: 13.0

buildup_alias_map:
  "Water": "WaterGP"
  "Iron": "IronGP"

sources:
  - type: "Point"
    position: [0.0, 0.0, 0.0]
    intensity: 1000.0

detectors:
  - name: "Det1"
    position: [10.0, 0.0, 0.0]
  - name: "Det2"
    position: [20.0, 0.0, 0.0]
